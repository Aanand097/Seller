[build]
  command = "NITRO_PRESET=netlify npm run build && echo '---FILES---' && find .netlify -type f -name '*.html' | head -20 && find .netlify -type d | head -20"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[build]
  command = "NITRO_PRESET=netlify npm run build; echo '=== DIST ==='; ls -la dist/ 2>/dev/null || echo 'NO DIST'; ls -la dist/client/ 2>/dev/null || echo 'NO DIST/CLIENT'"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

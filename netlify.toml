[build]
  command = "NITRO_PRESET=netlify npm run build; echo '=== ALL OUTPUT ==='; find . -not -path './node_modules/*' -not -path './.git/*' -name '*.html' 2>/dev/null; echo '=== DIRS ==='; ls -la .netlify/ 2>/dev/null; ls -la .output/ 2>/dev/null"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"
